apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: interview-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  
  minReplicas: 1
  maxReplicas: 1
  
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70    # Escalar cuando CPU > 70%
  
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80    # Escalar cuando memoria > 80%
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300      # Esperar 5 min antes de escalar para abajo
      policies:
      - type: Percent
        value: 50                          
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100                         
        periodSeconds: 30
