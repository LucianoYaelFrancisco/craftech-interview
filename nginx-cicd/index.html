<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Pipeline 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0f0f0f;
            color: #00ff00;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .terminal {
            border: 2px solid #00ff00;
            padding: 40px;
            max-width: 700px;
            background: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2em;
            letter-spacing: 2px;
            animation: blink 1s infinite;
        }
        .divider {
            border-top: 2px solid #00ff00;
            margin: 20px 0;
        }
        .status-line {
            margin: 12px 0;
            font-size: 1.1em;
        }
        .success {
            color: #00ff00;
        }
        .process {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            gap: 15px;
        }
        .step {
            flex: 1;
            text-align: center;
            padding: 15px;
            border: 1px solid #00ff00;
            background: #0f0f0f;
        }
        .step-number {
            font-size: 2em;
            font-weight: bold;
            color: #00ff00;
        }
        .step-text {
            font-size: 0.9em;
            margin-top: 5px;
        }
        .timestamp {
            text-align: right;
            font-size: 0.9em;
            margin-top: 30px;
            color: #888;
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.5; }
        }
        .arrow {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            <h1>▶ CI/CD PIPELINE</h1>
        </div>
        
  
        <div class="process">
            <div class="step">
                <div class="step-number">1</div>
                <div class="step-text">BUILD</div>
            </div>
            <div class="arrow">→</div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-text">PUSH</div>
            </div>
            <div class="arrow">→</div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-text">DEPLOY</div>
            </div>
        </div>
        
        <div class="divider"></div>
        
        <div class="timestamp">
            > Prueba Técnica 3 - Craftech| GitHub Actions + Docker
        </div>
    </div>
</body>
</html>
